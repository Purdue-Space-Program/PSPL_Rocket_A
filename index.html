<body>
    <main class="wrap">
        <h1>Rocket CAD</h1>

        <section class="viewer-card">
            <model-viewer 
                id="rocket_assembly_cad"
                camera-controls 
                touch-action="pan-y" 
                auto-rotate 
                auto-rotate-delay="5000" 
                rotation-per-second="1deg"
                shadow-intensity="1" 
                environment-image="neutral" 
                exposure="0.4" 
                loading="eager" 
                reveal="auto" 
                ar
            >
            </model-viewer>

            <div class="hint">
                Rotate: left click, Pan: right click
            </div>
            <div id="error" class="error" hidden></div>
        </section>
    </main>

    <script>
        const rocket_assembly_cad_file_path = "./LA0000-A_A_1-Rocket Assembly File.glb"

        const cad_display_element = document.getElementById("rocket_assembly_cad");
        const error_element = document.getElementById("error");

        // Set src from variable
        cad_display_element.src = rocket_assembly_cad_file_path;

        cad_display_element.addEventListener("error", () => {
            error_element.hidden = false;
            error_element.textContent =
                `Failed to load model. Expected file in path: ${rocket_assembly_cad_file_path}`;
        });
    </script>
</body>
